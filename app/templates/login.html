{% extends "base.html" %}
{% block title %}Sign in &mdash; Mnemosyne{% endblock %}

{% block body %}
<main class="login">
  <h1>Mnemosyne</h1>
  {% if sent %}
    <p class="note">If that address is allowlisted, a sign-in link is on its way.</p>
    <p class="muted">It expires in fifteen minutes.</p>
    <p class="muted"><a href="/login">Send another</a></p>
  {% else %}
    <form method="post" action="/auth/request">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autofocus
             placeholder="{{ email_hint }}">
      <button type="submit">Send sign-in link</button>
    </form>
  {% endif %}
</main>
{% endblock %}
