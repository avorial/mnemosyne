<div class="widget bookmark">
  <header class="widget-header">
    <h3>Bookmark</h3>
    <span class="ws-tag">{{ workspace }}</span>
  </header>
  {% if flash %}
    <div class="flash flash-{{ flash.kind }}" data-autohide="3500">{{ flash.message }}</div>
  {% endif %}
  <form class="widget-form bookmark-form"
        hx-post="/widgets/bookmark/save"
        hx-target="closest .widget"
        hx-swap="outerHTML"
        hx-disabled-elt="find button"
        method="post">
    <input type="text" inputmode="url" name="url"
           placeholder="https://… (paste a URL)"
           required autocomplete="off" spellcheck="false">
    <div class="widget-actions">
      <span class="muted htmx-indicator">Fetching…</span>
      <span class="muted save-hint">title &amp; description are fetched automatically</span>
      <button type="submit">Save bookmark</button>
    </div>
  </form>
  <div class="bookmark-list-wrap">
    <input type="search"
           class="bookmark-search"
           name="q"
           value="{{ q or '' }}"
           placeholder="Search saved bookmarks…"
           autocomplete="off"
           hx-get="/widgets/bookmark/list"
           hx-trigger="keyup changed delay:300ms, search"
           hx-target="#bookmark-list-{{ workspace }}"
           hx-swap="outerHTML">
    {% include "widgets/_bookmark_list.html" %}
  </div>
</div>
