<div class="ns-results" id="ns-results-{{ workspace }}">
  {% if hits is none %}
    <p class="ns-hint muted">Daily notes, inbox drops, and links. Newest first.</p>
  {% elif hits %}
    <ul class="ns-list">
      {% for h in hits %}
      <li class="ns-item">
        <button type="button" class="ns-open"
                hx-get="/widgets/note_search/note?path={{ h.relpath|urlencode }}&q={{ q|urlencode }}"
                hx-target="#ns-results-{{ workspace }}"
                hx-swap="outerHTML">
          <span class="ns-title">{{ h.title }}</span>
          <span class="ns-snippet">{{ h.pre }}{% if h.match %}<mark>{{ h.match }}</mark>{% endif %}{{ h.post }}</span>
          <span class="ns-meta"><span class="ns-path">{{ h.relpath }}</span> · {{ h.modified }}</span>
        </button>
      </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="ns-empty">Nothing in the vault matches "{{ q }}".</p>
  {% endif %}
</div>
