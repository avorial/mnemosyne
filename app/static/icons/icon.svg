<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Mnemosyne mark: serif M in candle gold on the night surface. -->
  <rect width="512" height="512" rx="96" fill="#0a0712"/>
  <radialGradient id="glow" cx="0.25" cy="0.05" r="1">
    <stop offset="0" stop-color="#6b2fcc" stop-opacity="0.45"/>
    <stop offset="0.6" stop-color="#6b2fcc" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>
  <text x="256" y="346"
        font-family="Iowan Old Style, Georgia, 'Times New Roman', serif"
        font-size="280" font-weight="400" text-anchor="middle"
        fill="#d4a957">M</text>
</svg>
