services:
  app:
    build: .
    container_name: mnemosyne-app
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      MAGIC_LINK_EMAIL: ${MAGIC_LINK_EMAIL}
      BASE_URL: ${BASE_URL}
      DB_PATH: ${DB_PATH:-/var/lib/mnemosyne/mnemosyne.db}
      VAULT_PERSONAL_PATH: ${VAULT_PERSONAL_PATH:-/mnt/mnemosyne/vault-notes}
      VAULT_WORK_PATH: ${VAULT_WORK_PATH:-/mnt/mnemosyne/vault-work}
      SECRETS_PATH: ${SECRETS_PATH:-/mnt/mnemosyne/secrets}
      GIT_SSH_COMMAND: ${GIT_SSH_COMMAND:-ssh -F /mnt/mnemosyne/secrets/ssh_config}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ASANA_PAT_FILE: ${ASANA_PAT_FILE:-/mnt/mnemosyne/secrets/asana_pat}
    volumes:
      - mnemosyne:/mnt/mnemosyne
      - mnemosyne-db:/var/lib/mnemosyne
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8100"]

  worker:
    build: .
    container_name: mnemosyne-worker
    restart: unless-stopped
    depends_on:
      - app
    environment:
      SECRET_KEY: ${SECRET_KEY}
      MAGIC_LINK_EMAIL: ${MAGIC_LINK_EMAIL}
      BASE_URL: ${BASE_URL}
      DB_PATH: ${DB_PATH:-/var/lib/mnemosyne/mnemosyne.db}
      VAULT_PERSONAL_PATH: ${VAULT_PERSONAL_PATH:-/mnt/mnemosyne/vault-notes}
      VAULT_WORK_PATH: ${VAULT_WORK_PATH:-/mnt/mnemosyne/vault-work}
      SECRETS_PATH: ${SECRETS_PATH:-/mnt/mnemosyne/secrets}
      GIT_SSH_COMMAND: ${GIT_SSH_COMMAND:-ssh -F /mnt/mnemosyne/secrets/ssh_config}
      ASANA_PAT_FILE: ${ASANA_PAT_FILE:-/mnt/mnemosyne/secrets/asana_pat}
    volumes:
      - mnemosyne:/mnt/mnemosyne
      - mnemosyne-db:/var/lib/mnemosyne
    command: ["python", "-m", "worker.sync"]

volumes:
  mnemosyne:
    external: true
  mnemosyne-db:
    driver: local
